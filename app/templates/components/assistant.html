<div id="aiAssistant">

    <button id="assistantBtn">

        🤖

    </button>

    <div id="assistantBox">

        <div class="assistant-header">

            AI Assistant

        </div>

        <div id="assistantMessages">

            <div class="assistant-message">

                👋 Hi! Ask me anything.

            </div>

        </div>

        <form id="assistantForm">

            <input
                type="text"
                id="assistantInput"
                placeholder="Ask AI..."
                autocomplete="off">

            <button>

                Send

            </button>

        </form>

    </div>

</div>
